seed: 42
deterministic: true

experiment_name: adamW

dataset:
  hf_dataset_name: Elriggs/openwebtext-100k
  max_length: 1024

model:
  name_or_path: "Qwen/Qwen2.5-0.5B"
  dtype: "bfloat16"
  attn_implementation: "sdpa" #"flash_attention_2"
  gradient_checkpointing: true

training:
  num_steps: 1500
  batch_size: 4
  grad_accum_steps: 16
  num_warmup_steps: 150
  device: cuda

evaluation:
  tasks:
    - piqa
    - arc_easy
    - arc_challenge
    - winogrande
    - hellaswag

  batch_size: 8
  num_fewshot: 0
  limit: null
  device: cuda
  log_samples: false

optimizer:
  type: adamw
  lr: 0.0001
  betas: [0.9, 0.95]
  eps: 1e-6
  weight_decay: 1e-2
  amsgrad: false
  maximize: false
  foreach: null
  capturable: false
  differentiable: false
  fused: null
