experiment_name: "hybrid"

optimizer:
  type: hybrid
  muon_layers_limit: 12

  muon:
    lr: 0.002
    momentum: 0.95
    nesterov: true
    weight_decay: 0.01
    ns_coefficients: [3.4445, -4.775, 2.0315]
    eps: 1e-8
    ns_steps: 5
    adjust_lr_fn: null

  adamw_2d:
    lr: 5e-5
    betas: [0.9, 0.999]
    eps: 1e-8
    weight_decay: 0.01
    amsgrad: false
    maximize: false
    foreach: null
    capturable: false
    differentiable: false
    fused: null

  adamw_other:
    lr: 5e-5
    betas: [0.9, 0.999]
    eps: 1e-8
    weight_decay: 0.01
    amsgrad: false
    maximize: false
    foreach: null
    capturable: false
    differentiable: false
    fused: null
